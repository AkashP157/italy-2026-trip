<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Italy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ========== APPLE DESIGN TOKENS — DARK ========== */
:root,html[data-theme="dark"]{
  --bg:#000;--bg2:#0d0d0d;--bg3:#1a1a1a;
  --widget:#1c1c1e;--widget2:#2c2c2e;--widget3:#3a3a3c;
  --accent:#ff9f0a;--accent2:#ff7a00;--accent-dim:rgba(255,159,10,.12);--accent-glow:rgba(255,159,10,.25);
  --text:#fff;--text2:rgba(255,255,255,.6);--text3:rgba(255,255,255,.35);--text4:rgba(255,255,255,.18);
  --border:rgba(255,255,255,.08);
  --red:#ff453a;--orange:#ff9f0a;--yellow:#ffd60a;--green:#30d158;--mint:#63e6e2;
  --teal:#40c8e0;--cyan:#64d2ff;--blue:#0a84ff;--indigo:#5e5ce6;
  --purple:#bf5af2;--pink:#ff375f;
  --wr:22px;--wr-sm:16px;--wr-xs:10px;
  --nav-h:82px;--head-h:52px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --sidebar-w:280px;
}
/* ========== APPLE DESIGN TOKENS — LIGHT ========== */
html[data-theme="light"]{
  --bg:#f2f2f7;--bg2:#e5e5ea;--bg3:#d1d1d6;
  --widget:#fff;--widget2:#f2f2f7;--widget3:#e5e5ea;
  --accent:#ff9500;--accent2:#e68600;--accent-dim:rgba(255,149,0,.1);--accent-glow:rgba(255,149,0,.2);
  --text:#000;--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.3);--text4:rgba(0,0,0,.12);
  --border:rgba(0,0,0,.06);
  --red:#ff3b30;--orange:#ff9500;--yellow:#ffcc00;--green:#34c759;--mint:#00c7be;
  --teal:#30b0c7;--cyan:#32ade6;--blue:#007aff;--indigo:#5856d6;
  --purple:#af52de;--pink:#ff2d55;
}

/* ========== BASE ========== */
html{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  -webkit-tap-highlight-color:transparent;font-size:15px;line-height:1.47
}
body{min-height:100dvh;background:var(--bg);overflow:hidden}
h1,h2,h3{font-weight:700;letter-spacing:-.02em}
.mono{font-family:'Courier Prime','SF Mono',monospace}
::-webkit-scrollbar{width:0;height:0}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}

/* ========== LAYOUT ========== */
#app{display:flex;flex-direction:column;height:100dvh;position:relative}

/* ========== HEADER ========== */
#header{
  height:calc(var(--head-h) + var(--safe-t));padding-top:var(--safe-t);
  display:flex;align-items:center;justify-content:space-between;
  padding-inline:20px;background:var(--bg);
  flex-shrink:0;z-index:50;position:relative;
}
.logo{display:flex;align-items:center;gap:8px}
.logo-flag{font-size:22px;line-height:1}
.logo-text{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.hdr-right{display:flex;gap:4px;align-items:center}
.hdr-sub{font-size:13px;color:var(--text2);font-weight:500;margin-right:8px}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .2s;background:var(--widget);
}
.icon-btn:hover{color:var(--text);background:var(--widget2)}
.icon-btn svg{width:18px;height:18px;fill:currentColor}

/* ========== BODY ========== */
#body{display:flex;flex:1;overflow:hidden;position:relative}

/* ========== SIDEBAR ========== */
#sidebar{
  display:none;width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:16px 0;
}
.sb-section{padding:0 12px;margin:14px 0 6px}.sb-section:first-child{margin-top:0}
.sb-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:600;padding:0 8px}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  font-size:14px;font-weight:500;color:var(--text2);
  border-radius:var(--wr-sm);margin:1px 0;transition:all .12s;cursor:pointer;
}
.sb-item:hover{color:var(--text);background:var(--widget)}
.sb-item.active{color:#fff;background:var(--blue)}
.sb-item svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.sb-divider{height:.5px;background:var(--border);margin:8px 20px}
.sb-day{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  cursor:pointer;border-radius:var(--wr-xs);margin:1px 0;transition:all .12s;
}
.sb-day:hover{background:var(--widget)}.sb-day.active{background:var(--widget)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-dn{font-family:'Courier Prime',monospace;font-size:11px;color:var(--text3);flex-shrink:0;width:16px}
.sb-dt{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-day:hover .sb-dt,.sb-day.active .sb-dt{color:var(--text)}

/* ========== MAIN ========== */
#main{flex:1;overflow:hidden;position:relative}
.screen{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:0 0 100px;opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.screen.active{opacity:1;pointer-events:auto}
@media(min-width:768px){.screen{padding-bottom:32px}}

/* ========== BOTTOM TAB BAR ========== */
#tab-bar{
  height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);
  display:flex;align-items:flex-start;padding-top:8px;
  background:color-mix(in srgb, var(--bg) 75%, transparent);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.33px solid var(--border);flex-shrink:0;z-index:50;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 0;color:var(--text3);transition:color .15s;user-select:none;
}
.tab.active{color:var(--blue)}
.tab svg{width:24px;height:24px;fill:currentColor}
.tab span{font-size:10px;font-weight:500}
@media(min-width:768px){#tab-bar{display:none}#sidebar{display:flex;flex-direction:column}}

/* ========== WIDGET SYSTEM ========== */
.widget-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;padding:16px;
}
@media(min-width:480px){.widget-grid{gap:14px;padding:18px}}
@media(min-width:768px){.widget-grid{grid-template-columns:repeat(2,1fr);gap:16px;padding:20px;max-width:800px;margin:0 auto}}
@media(min-width:1024px){.widget-grid{grid-template-columns:repeat(3,1fr);max-width:1000px}}

.w{
  background:var(--widget);border-radius:var(--wr);
  padding:14px 16px;min-height:0;
  position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;
}
.w:active{transform:scale(.97)}
.w-span2{grid-column:span 2}
@media(min-width:1024px){.w-span2{grid-column:span 2}.w-span3{grid-column:span 3}}
.w-full{grid-column:1/-1}
.w-colored{color:#fff}

/* Widget typography */
.w-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;opacity:.55;margin-bottom:4px}
.w-title{font-size:14px;font-weight:600;line-height:1.3}
.w-subtitle{font-size:12px;opacity:.55;line-height:1.35;margin-top:2px}
.w-big{font-size:48px;font-weight:800;letter-spacing:-.04em;line-height:1}
.w-huge{font-size:72px;font-weight:800;letter-spacing:-.04em;line-height:.9}
.w-medium{font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1.1}
.w-small-val{font-size:18px;font-weight:700;letter-spacing:-.02em}

/* Widget colors */
.w-red{background:var(--red)}.w-orange{background:var(--orange)}.w-yellow{background:var(--yellow);color:#000}
.w-green{background:var(--green)}.w-blue{background:var(--blue)}.w-indigo{background:var(--indigo)}
.w-purple{background:var(--purple)}.w-pink{background:var(--pink)}.w-teal{background:var(--teal)}
.w-gradient-sunset{background:linear-gradient(135deg,#ff6b35,#f7c948)}
.w-gradient-ocean{background:linear-gradient(135deg,#0a84ff,#5ac8fa);color:#fff}
.w-gradient-forest{background:linear-gradient(135deg,#30d158,#63e6e2);color:#000}
.w-gradient-wine{background:linear-gradient(135deg,#bf5af2,#ff375f);color:#fff}
.w-gradient-night{background:linear-gradient(135deg,#1c1c1e,#3a3a3c)}

/* Today / pre-trip */
.cd-widget{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;min-height:200px;
  background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;
}
.cd-number{font-size:clamp(80px,22vw,140px);font-weight:900;letter-spacing:-.06em;line-height:.85}
.cd-label{font-size:16px;font-weight:500;opacity:.85;margin-top:6px}
.cd-date{font-size:12px;opacity:.65;margin-top:8px;letter-spacing:.02em}
.cd-timer{font-family:'Courier Prime',monospace;font-size:24px;font-weight:700;margin-top:16px;letter-spacing:.08em;background:rgba(0,0,0,.2);padding:6px 16px;border-radius:var(--wr-sm)}

/* Route dots */
.route-dots{display:flex;align-items:center;gap:3px;margin-top:16px;justify-content:center}
.route-dot{width:10px;height:10px;border-radius:50%;opacity:.9;transition:transform .15s}
.route-dot:hover{transform:scale(1.3)}
.route-line{width:12px;height:2px;background:rgba(255,255,255,.3)}

/* Timeline card list */
.tl-list{display:flex;flex-direction:column;gap:2px;padding:0 16px 16px}
@media(min-width:768px){.tl-list{max-width:800px;margin:0 auto;padding:0 20px 20px}}

.tl-card{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;border-radius:var(--wr-sm);
  background:var(--widget);transition:all .12s;
}
.tl-card:active{background:var(--widget2)}
.tl-card.is-past{opacity:.35}
.tl-card.is-current{background:var(--widget2)}
.tl-card.has-ticket{cursor:pointer}

.tl-pip{width:3px;border-radius:3px;min-height:36px;flex-shrink:0;align-self:stretch;margin:2px 0}
.pip-booked{background:var(--green)}.pip-train{background:var(--orange)}.pip-flight{background:var(--purple)}
.pip-hotel{background:var(--blue)}.pip-sight{background:var(--widget3)}.pip-food{background:var(--widget3)}
.pip-suggestion{background:transparent;border:1px dashed var(--text4)}

.tl-time{font-family:'Courier Prime',monospace;font-size:13px;font-weight:700;color:var(--text2);width:44px;flex-shrink:0;padding-top:1px}
.tl-card.is-past .tl-time{color:var(--text3)}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35}
.tl-card.is-past .tl-title{text-decoration:line-through;text-decoration-color:var(--text4);color:var(--text2)}
.tl-desc{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.45}
.tl-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tl-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px}
.tag-booked{color:var(--green);background:rgba(48,209,88,.12)}
.tag-train{color:var(--orange);background:rgba(255,159,10,.12)}
.tag-flight{color:var(--purple);background:rgba(191,90,242,.12)}
.tag-ref{color:var(--accent);background:var(--accent-dim)}
.tl-ticket-hint{font-size:11px;color:var(--blue);font-weight:600;margin-top:4px}
.tl-sug-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border:1px solid var(--text4);padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}

.tl-card.is-suggestion{background:transparent;border:1px solid var(--border)}
.tl-card.is-suggestion .tl-title{font-weight:500;color:var(--text2)}
.sug-links{display:flex;gap:6px;margin-top:6px}
.sug-link{font-size:11px;font-weight:600;color:var(--blue);padding:4px 10px;border-radius:var(--wr-xs);background:rgba(10,132,255,.1);transition:all .12s}
.sug-link:hover{background:rgba(10,132,255,.2)}

.section-divider{display:flex;align-items:center;gap:10px;padding:16px 16px 8px}
@media(min-width:768px){.section-divider{max-width:800px;margin:0 auto;padding:16px 20px 8px;width:100%}}
.section-divider span{font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap}
.section-divider::after{content:'';flex:1;height:.5px;background:var(--border)}

/* Day pills */
.pill-strip{display:flex;gap:6px;overflow-x:auto;padding:12px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pill-strip::-webkit-scrollbar{display:none}
@media(min-width:768px){.pill-strip{padding:12px 20px;max-width:800px;margin:0 auto}}
.pill{
  flex-shrink:0;font-family:'Courier Prime',monospace;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:20px;
  background:var(--widget);color:var(--text2);
  transition:all .15s;white-space:nowrap;
}
.pill.active{background:var(--blue);color:#fff}
.pill:hover:not(.active){background:var(--widget2);color:var(--text)}

/* Day navigation */
.day-nav{display:flex;gap:8px;padding:12px 0}
.day-nav-btn{
  flex:1;padding:12px;background:var(--widget);border-radius:var(--wr-sm);
  color:var(--text2);font-size:14px;font-weight:600;text-align:center;
  transition:all .12s;
}
.day-nav-btn:hover{background:var(--widget2);color:var(--text)}
.day-nav-btn:active{transform:scale(.97)}
.day-nav-btn:disabled{opacity:.15;pointer-events:none}
.day-nav-btn.accent{color:var(--blue)}

/* Map */
#v-map{padding:0!important}
#map-box{width:100%;height:calc(100dvh - var(--head-h) - var(--nav-h) - var(--safe-t) - var(--safe-b) - 48px);background:var(--widget);display:flex;align-items:center;justify-content:center;color:var(--text3)}
@media(min-width:768px){#map-box{height:calc(100dvh - var(--head-h) - var(--safe-t) - 48px)}}

/* Bookings */
.bk-grid{display:grid;gap:12px;padding:12px 16px}
@media(min-width:768px){.bk-grid{grid-template-columns:1fr 1fr;gap:14px;padding:14px 20px;max-width:800px;margin:0 auto}}
@media(min-width:1024px){.bk-grid{grid-template-columns:repeat(3,1fr)}}
.bk-card{background:var(--widget);border-radius:var(--wr);overflow:hidden;transition:all .12s}
.bk-card:active{transform:scale(.98)}
.bk-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.bk-icon{width:38px;height:38px;border-radius:var(--wr-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bk-icon.ic-hotel{background:rgba(10,132,255,.15)}.bk-icon.ic-train{background:rgba(255,159,10,.15)}
.bk-icon.ic-flight{background:rgba(191,90,242,.15)}.bk-icon.ic-tour{background:rgba(48,209,88,.15)}
.bk-info{flex:1;min-width:0}
.bk-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-meta{font-size:12px;color:var(--text2);margin-top:1px}
.bk-chev{color:var(--text3);transition:transform .2s;font-size:11px;flex-shrink:0}
.bk-card.open .bk-chev{transform:rotate(180deg)}
.bk-detail{max-height:0;overflow:hidden;transition:max-height .3s ease}.bk-card.open .bk-detail{max-height:2000px}
.bk-ticket{border-top:.5px solid var(--border);padding:14px 16px}
.bk-fields{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.bk-field{flex:1;min-width:90px}
.bk-field-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:3px}
.bk-field-v{font-size:13px;color:var(--text);line-height:1.4}
.bk-field-v.mono{font-family:'Courier Prime',monospace;color:var(--accent);font-size:14px;font-weight:700}
.bk-conf{background:var(--bg3);border-radius:var(--wr-sm);padding:12px 14px;margin-top:10px;position:relative}
.bk-conf-top{display:flex;align-items:center;justify-content:space-between}
.bk-conf-label{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600}
.bk-conf-code{font-family:'Courier Prime',monospace;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:2px;word-break:break-all}
.bk-conf-copy{font-size:10px;font-weight:600;color:var(--blue);cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .12s;text-transform:uppercase;letter-spacing:.04em}
.bk-conf-copy:hover{background:rgba(10,132,255,.12)}
.bk-conf-copy.copied{color:var(--green)}
.bk-qr{margin-top:10px;display:flex;justify-content:center}
.bk-qr canvas{border-radius:var(--wr-xs);background:#fff;padding:8px}
.bk-note{margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:var(--wr-xs);font-size:12px;color:var(--text2);line-height:1.6}
.bk-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.bk-act{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:8px 12px;border-radius:var(--wr-xs);transition:all .12s;cursor:pointer}
.bk-act:active{transform:scale(.96)}
.bk-act-map{background:rgba(10,132,255,.12);color:var(--blue)}
.bk-act-map:hover{background:rgba(10,132,255,.2)}
.bk-act-call{background:rgba(48,209,88,.1);color:var(--green)}
.bk-act-call:hover{background:rgba(48,209,88,.18)}
.bk-act-copy{background:rgba(255,159,10,.1);color:var(--orange)}
.bk-act-copy:hover{background:rgba(255,159,10,.18)}
.bk-pax{margin-top:10px}
.bk-pax-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:6px}
.bk-pax-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--widget2);border-radius:var(--wr-xs);margin-bottom:4px}
.bk-pax-name{font-size:13px;font-weight:600;color:var(--text);flex-shrink:0;min-width:100px}
.bk-pax-code{font-family:'Courier Prime',monospace;font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.5px;flex:1;word-break:break-all}
.bk-pax-qr{display:flex;justify-content:center;margin-top:4px}
.bk-pax-qr canvas{border-radius:4px;background:#fff;padding:4px}

/* ========== MORE VIEW ========== */
.more-pad{padding:16px;max-width:800px;margin:0 auto}
@media(min-width:768px){.more-pad{padding:20px}}
.more-section{margin-bottom:32px}
.more-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.more-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.more-badge{font-family:'Courier Prime',monospace;font-size:13px;color:var(--blue);font-weight:700}

/* Checklist */
.cl-progress{height:4px;background:var(--widget);border-radius:4px;overflow:hidden;margin-bottom:14px}
.cl-progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .35s ease}
.cl-cat-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin:14px 0 6px;padding:0 4px}
.cl-item{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  background:var(--widget);border-radius:var(--wr-sm);margin-bottom:3px;
  cursor:pointer;transition:all .1s;
}
.cl-item:active{transform:scale(.98)}
.cl-item.checked{opacity:.45}
.cl-item.checked .cl-text{text-decoration:line-through;color:var(--text2)}
.cl-check{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--text4);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;font-size:11px;color:transparent;
}
.cl-item.checked .cl-check{background:var(--green);border-color:var(--green);color:#fff}
.cl-text{font-size:14px;color:var(--text)}

/* Budget */
.budget-total-card{
  background:var(--widget);border-radius:var(--wr);padding:24px;text-align:center;margin-bottom:14px;
}
.budget-amount{font-size:44px;font-weight:800;letter-spacing:-.04em;color:var(--text)}

const diffD=(a,b)=>Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5);
const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m};

const Weather={
  data:{},
  async fetch(){
    const promises=T.days.map(async d=>{
      const loc=d.ev[0];if(!loc)return;
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto&start_date=${d.d}&end_date=${d.d}`);
        const j=await r.json();if(j.daily)this.data[d.d]={hi:Math.round(j.daily.temperature_2m_max[0]),lo:Math.round(j.daily.temperature_2m_min[0]),code:j.daily.weather_code[0]};
      }catch(e){}
    });
    await Promise.all(promises);
  },
  icon(c){if(c===undefined)return'';if(c<=0)return'☀️';if(c<=3)return'⛅';if(c<=48)return'🌫️';if(c<=57)return'🌦️';if(c<=67)return'🌧️';if(c<=77)return'❄️';if(c<=82)return'🌦️';return'⛈️'},
  desc(c){if(c===undefined)return'';if(c<=0)return'Clear';if(c<=3)return'Partly cloudy';if(c<=48)return'Foggy';if(c<=57)return'Drizzle';if(c<=67)return'Rain';if(c<=77)return'Snow';if(c<=82)return'Showers';return'Storm'}
};

/* ══════════════ TIMELINE BUILDER ══════════════ */
function buildTL(day){
  const now=nowMin(),isT=day.d===today();
  const fixed=[],sugg=[];
  day.ev.forEach(e=>{(e.type==='flight'||e.type==='train'||e.type==='hotel'||e.type==='booked'?fixed:sugg).push(e)});
  let o='';
  if(fixed.length){
    o+='<div class="section-divider"><span>Confirmed</span></div><div class="tl-list">';
    let fc=false;
    fixed.forEach((e,i)=>{
      const em=toMin(e.tm),nx=i<fixed.length-1?toMin(fixed[i+1].tm):1440;
      let cls='';if(isT){if(now>=nx)cls='is-past';else if(now>=em&&!fc){cls='is-current';fc=true}}
      const ht=(e.type==='booked'||e.type==='train'||e.type==='flight')&&(e.ref||e.d);
      if(ht)cls+=' has-ticket';
      const desc=e.d?e.d.split('\n').map(l=>esc(l)).join('<br>'):'';
      const tags=[];
      if(e.type==='booked')tags.push('<span class="tl-tag tag-booked">Booked</span>');
      if(e.type==='flight')tags.push('<span class="tl-tag tag-flight">Flight</span>');
      if(e.type==='train')tags.push('<span class="tl-tag tag-train">Transit</span>');
      if(e.ref)tags.push(`<span class="tl-tag tag-ref">${esc(e.ref)}</span>`);
      const ck=ht?` onclick="Ticket.show(${JSON.stringify(e).replace(/"/g,'&quot;')},'${day.d}')"`:''
      o+=`<div class="tl-card ${cls}"${ck}><div class="tl-pip pip-${e.type}"></div><div class="tl-time">${esc(e.tm)}</div><div class="tl-body"><div class="tl-title">${esc(e.t)}</div>${desc?`<div class="tl-desc">${desc}</div>`:''}${tags.length?'<div class="tl-tags">'+tags.join('')+'</div>':''}${ht?'<div class="tl-ticket-hint">View details →</div>':''}</div></div>`;
    });o+='</div>';
  }
  if(sugg.length){
    o+='<div class="section-divider"><span>Ideas</span></div><div class="tl-list">';
    let fc2=false;
    sugg.forEach((e,i)=>{
      const em=toMin(e.tm),nx=i<sugg.length-1?toMin(sugg[i+1].tm):1440;
      let cls='is-suggestion';if(isT){if(now>=nx)cls+=' is-past';else if(now>=em&&!fc2){cls+=' is-current';fc2=true}}
      const desc=e.d?e.d.split('\n').map(l=>esc(l)).join('<br>'):'';
      const gq=encodeURIComponent(e.t+' Italy');
      o+=`<div class="tl-card ${cls}"><div class="tl-pip pip-suggestion"></div><div class="tl-time">${esc(e.tm)}</div><div class="tl-body"><div class="tl-title">${esc(e.t)} <span class="tl-sug-badge">IDEA</span></div>${desc?`<div class="tl-desc">${desc}</div>`:''}<div class="sug-links"><a class="sug-link" href="https://www.google.com/search?q=${gq}" target="_blank" rel="noopener">Search</a><a class="sug-link" href="#" onclick="event.preventDefault();Panel.openMap('${esc(e.t).replace(/'/g,"\\'")}',${e.lat},${e.lng})">Map</a></div></div></div>`;
    });o+='</div>';
  }
  return o;
}

    if(td<T.start){
      const dl=diffD(td,T.start);
      const dots=Object.values(T.regions).map(r=>`<span class="route-dot" style="background:${r.c}" title="${r.n}"></span>`).join('<span class="route-line"></span>');

      return;
    }
    // Post-trip
    if(td>T.end){el.innerHTML='<div style="text-align:center;padding:80px 24px"><div style="font-size:56px;margin-bottom:16px">🇮🇹</div><div style="font-size:28px;font-weight:700;letter-spacing:-.02em">What a journey.</div><p style="font-size:15px;color:var(--text2);margin-top:8px">Italy 2026 — April 2–19</p></div>';return}
    // Active trip
    const d=T.days[idx],ri=T.regions[d.r],pct=((idx+1)/T.total*100).toFixed(0);
    const w=Weather.data[d.d];
    el.innerHTML=`<div class="widget-grid">${this.dayWidget(d,ri)}${this.nextWidget(d)}${this.weatherWidget(d)}${this.stayWidget(d)}${this.progressWidget(d,pct)}</div>${buildTL(d)}`;
  },
  preWidgets(){
    const d1=T.days[0];
    const w=Weather.data[d1.d];
    let h=`<div class="w" style="display:flex;flex-direction:column;justify-content:space-between"><div class="w-label">Day 1</div><div class="w-medium" style="margin-top:4px">${esc(d1.t)}</div><div class="w-subtitle">${fmtD(d1.d)}</div></div>`;
    h+=`<div class="w w-gradient-ocean"><div class="w-label" style="opacity:.7">Route</div><div style="font-size:20px;font-weight:700;margin-top:4px">7 cities</div><div class="w-subtitle" style="opacity:.7">18 days across Italy</div></div>`;
    return h;
  },
  preTimeline(){
    return`<div class="section-divider"><span>Day One Preview</span></div>${buildTL(T.days[0]).replace(/<div class="section-divider">.*?<\/div>/g,'')}`;
  },
  dayWidget(d,ri){
    return`<div class="w w-colored w-span2" style="background:${ri.c};min-height:120px;display:flex;flex-direction:column;justify-content:flex-end"><div style="font-size:13px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.04em">${ri.n} · Day ${d.n}</div><div style="font-size:32px;font-weight:800;letter-spacing:-.03em;margin-top:4px;line-height:1.1">${esc(d.t)}</div><div style="font-size:13px;opacity:.7;margin-top:4px">${fmtD(d.d)} · ${esc(d.s)}</div></div>`;
  },
  nextWidget(){
    return`<div class="w" style="display:flex;flex-direction:column;justify-content:space-between"><div class="w-label">Next Up</div><div id="cd-main" style="margin-top:auto"><div class="w-title">—</div></div></div>`;
  },
  weatherWidget(d){
    const w=Weather.data[d.d];
    if(!w)return`<div class="w w-gradient-night"><div class="w-label">Weather</div><div class="w-medium" style="margin-top:8px">—</div></div>`;
    return`<div class="w" style="display:flex;flex-direction:column;justify-content:space-between"><div class="w-label">Weather</div><div style="display:flex;align-items:center;gap:8px;margin-top:auto"><span style="font-size:32px">${Weather.icon(w.code)}</span><div><div style="font-size:28px;font-weight:800;letter-spacing:-.03em">${w.hi}°</div><div style="font-size:12px;color:var(--text2)">L:${w.lo}° · ${Weather.desc(w.code)}</div></div></div></div>`;
  },
  stayWidget(d){
    if(!d.acc)return'';
    return`<div class="w w-span2" style="display:flex;align-items:center;gap:14px"><div style="font-size:28px">🏨</div><div style="flex:1;min-width:0"><div class="w-label">Staying At</div><div class="w-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.acc.name)}</div><div class="w-subtitle">${esc(d.acc.addr)}</div>${d.acc.ref?`<div style="font-family:'Courier Prime',monospace;font-size:12px;color:var(--accent);font-weight:700;margin-top:3px;letter-spacing:.5px">${esc(d.acc.ref)}</div>`:''}</div></div>`;
  },
  progressWidget(d,pct){
    return`<div class="w w-full" style="padding:12px 16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span class="w-label" style="margin:0">Trip Progress</span><span style="font-family:'Courier Prime',monospace;font-size:11px;color:var(--text3)">${pct}% · ${d.n}/${T.total}</span></div><div style="height:4px;background:var(--widget2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--green);border-radius:4px;transition:width .5s"></div></div></div>`;
  },
  startCD(){if(S.tick)clearInterval(S.tick);S.tick=setInterval(()=>this.upCD(),1000);this.upCD()},
  upCD(){
    const td=today(),el=document.getElementById('cd-main');if(!el)return;
    if(td<T.start){
      const n=new Date(),s=new Date(T.start+'T00:00:00'),d=s-n;
      if(d<=0){el.textContent='✨ Today!';return}
      const h=Math.floor(d%864e5/36e5),m=Math.floor(d%36e5/6e4),sc=Math.floor(d%6e4/1e3);
      el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;return;
    }
    const idx=todayIdx();if(idx<0)return;
    const day=T.days[idx],nm=nowMin(),nxt=day.ev.find(e=>toMin(e.tm)>nm);
    if(nxt){const df=toMin(nxt.tm)-nm;el.innerHTML=`<div class="w-title">${esc(nxt.t)}</div><div style="font-family:'Courier Prime',monospace;font-size:14px;color:var(--accent);font-weight:700;margin-top:4px">${Math.floor(df/60)?Math.floor(df/60)+'h ':''}${df%60}m</div>`}
    else el.innerHTML='<div class="w-title">All done ✨</div>';
  }
};

const BkView={
  cats:[{k:'hotels',l:'Hotels'},{k:'flights',l:'Flights'},{k:'trains',l:'Trains'},{k:'tours',l:'Activities'}],
  render(){
    const el=document.getElementById('v-bookings');
    let t='<div class="pill-strip">';
    this.cats.forEach(c=>{t+=`<button class="pill ${S.bkCat===c.k?'active':''}" onclick="BkView.cat('${c.k}')">${c.l}</button>`});
    el.innerHTML=t+'</div><div class="bk-grid" id="bk-list"></div>';this.show(S.bkCat);
  },
  cat(k){S.bkCat=k;document.querySelectorAll('#v-bookings .pill').forEach((p,i)=>p.classList.toggle('active',this.cats[i].k===k));this.show(k)},
  show(k){
    const list=document.getElementById('bk-list'),items=T.bookings[k];
    if(!items?.length){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);grid-column:1/-1">No bookings</div>';return}
    const em={flights:'✈️',hotels:'🏨',trains:'🚄',tours:'🎟️'}[k],ic={flights:'ic-flight',hotels:'ic-hotel',trains:'ic-train',tours:'ic-tour'}[k];
    list.innerHTML=items.map(b=>`<div class="bk-card${S.openBk.has(b.id)?' open':''}" id="bk-${b.id}"><div class="bk-head" onclick="BkView.tog('${b.id}')"><div class="bk-icon ${ic}">${em}</div><div class="bk-info"><div class="bk-title">${esc(b.t)}</div><div class="bk-meta">${esc(b.dt||b.tm||'')}</div></div><div class="bk-chev">▼</div></div><div class="bk-detail"><div class="bk-ticket">${this.rows(b,k)}</div></div></div>`).join('');
    // Generate QR codes after DOM is ready
    requestAnimationFrame(()=>this.qr());
  },
  rows(b,k){
    const f=(l,v)=>v?`<div class="bk-field"><div class="bk-field-l">${l}</div><div class="bk-field-v">${esc(v)}</div></div>`:'';
    let fields='',conf='';
    if(k==='flights'){fields=f('Time',b.tm)+f('Airline',b.airline);conf=b.conf}
    else if(k==='hotels'){fields=f('Dates',b.dt)+f('Address',b.addr)+f('Check-in',b.in)+f('Check-out',b.out)+f('Phone',b.phone);conf=b.conf;if(b.pin)fields+=f('PIN',b.pin)}
    else if(k==='trains'){fields=f('Date',b.dt)+f('Time',b.tm)+f('Operator',b.op)+f('Cost',b.cost);conf=b.conf}
    else if(k==='tours'){fields=f('Date',b.dt)+f('Time',b.tm)+f('Venue',b.venue)+f('Cost',b.cost);conf=b.conf}
    let o=`<div class="bk-fields">${fields}</div>`;
    // Confirmation code with copy + QR
    if(conf){
      o+=`<div class="bk-conf"><div class="bk-conf-top"><span class="bk-conf-label">Confirmation</span><span class="bk-conf-copy" onclick="BkView.copy(this,'${esc(conf)}')">Copy</span></div><div class="bk-conf-code">${esc(conf)}</div><div class="bk-qr" data-qr="${esc(conf)}"></div></div>`;
    }
    // Per-person details (train seats or tour ticket codes)
    if(b.pax&&b.pax.length){
      o+='<div class="bk-pax"><div class="bk-pax-head">Per Person</div>';
      b.pax.forEach(p=>{
        const val=p.s||p.code||'';
        o+=`<div class="bk-pax-row"><div class="bk-pax-name">${esc(p.n)}</div><div class="bk-pax-code">${esc(val)}</div></div>`;
        if(p.code)o+=`<div class="bk-pax-qr" data-qr="${esc(p.code)}"></div>`;
      });
      o+='</div>';
    }
    // Notes
    if(b.note)o+=`<div class="bk-note">${b.note.split('\n').map(l=>esc(l)).join('<br>')}</div>`;
    // Action buttons
    const acts=[];
    if(b.lat&&b.lng)acts.push(`<a class="bk-act bk-act-map" href="https://www.google.com/maps/search/?api=1&query=${b.lat},${b.lng}" target="_blank" rel="noopener">📍 Navigate</a>`);
    if(b.phone)acts.push(`<a class="bk-act bk-act-call" href="tel:${esc(b.phone)}">📞 ${esc(b.phone)}</a>`);
    if(conf)acts.push(`<span class="bk-act bk-act-copy" onclick="BkView.copy(this,'${esc(conf)}')">📋 Copy Code</span>`);
    if(acts.length)o+=`<div class="bk-actions">${acts.join('')}</div>`;
    return o;
  },
  copy(el,text){
    navigator.clipboard.writeText(text).then(()=>{
      el.textContent=el.tagName==='SPAN'&&el.classList.contains('bk-conf-copy')?'Copied!':'📋 Copied!';
      el.classList.add('copied');
      setTimeout(()=>{el.textContent=el.classList.contains('bk-conf-copy')?'Copy':'📋 Copy Code';el.classList.remove('copied')},1500);
    });
  },
  qr(){
    if(typeof QRCode==='undefined')return;
    document.querySelectorAll('[data-qr]').forEach(el=>{
      if(el.querySelector('canvas'))return;
      const text=el.dataset.qr;if(!text)return;
      const size=el.classList.contains('bk-pax-qr')?100:140;
      try{new QRCode(el,{text,width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M})}catch(e){}
    });
  },
  tog(id){
    if(S.openBk.has(id))S.openBk.delete(id);else S.openBk.add(id);
    document.getElementById('bk-'+id)?.classList.toggle('open');
    // Re-render QR codes after card opens
    setTimeout(()=>this.qr(),350);
  }
};

/* ══════════════ AUTH ══════════════ */
const Auth={
  K:'italy26_token',
  email:'',
  challenge:'',
  async init(){
    Theme.init();
    const token=localStorage.getItem(this.K);
    if(token){
      try{
        const r=await fetch('/api/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
        const j=await r.json();
        if(j.ok&&j.valid){this.unlock();return}

      localStorage.removeItem(this.K);
    }

    document.getElementById('auth-otp').addEventListener('keydown',e=>{if(e.key==='Enter')this.verifyOTP()});
    document.getElementById('auth-otp').addEventListener('input',e=>{if(e.target.value.length===6)this.verifyOTP()});
  },
  async sendOTP(){
    const email=document.getElementById('auth-email').value.trim();
    const err=document.getElementById('auth-email-err');
    const btn=document.getElementById('auth-send-btn');
    if(!email||!email.includes('@')){err.textContent='Enter a valid email';return}
    err.textContent='';btn.disabled=true;btn.textContent='Sending...';
    try{
      const r=await fetch('/api/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
      const j=await r.json();
      if(!r.ok){err.textContent=j.error||'Failed to send';btn.disabled=false;btn.textContent='Send Access Code';return}
      this.email=email;
      this.challenge=j.challenge;
      document.getElementById('auth-otp-sub').textContent=`We sent a 6-digit code to ${email}`;
      document.getElementById('auth-step-email').classList.remove('active');
      document.getElementById('auth-step-otp').classList.add('active');
      document.getElementById('auth-otp').focus();
    }catch(e){err.textContent='Network error. Try again.'}
    btn.disabled=false;btn.textContent='Send Access Code';
  },
  async verifyOTP(){
    const otp=document.getElementById('auth-otp').value.trim();
    const err=document.getElementById('auth-otp-err');
    const btn=document.getElementById('auth-verify-btn');
    if(!otp||otp.length!==6){err.textContent='Enter the 6-digit code';return}
    err.textContent='';btn.disabled=true;btn.textContent='Verifying...';
    try{
      const r=await fetch('/api/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({otp,challenge:this.challenge})});
      const j=await r.json();
      if(!r.ok){err.textContent=j.error||'Invalid code';btn.disabled=false;btn.textContent='Verify Code';return}
      localStorage.setItem(this.K,j.token);
      this.unlock();
    }catch(e){err.textContent='Network error.'}
    btn.disabled=false;btn.textContent='Verify Code';
  },
  backToEmail(){
    document.getElementById('auth-step-otp').classList.remove('active');
    document.getElementById('auth-step-email').classList.add('active');
    document.getElementById('auth-otp').value='';
    document.getElementById('auth-otp-err').textContent='';
  },
  unlock(){
    document.getElementById('auth-wall').classList.add('hidden');
    document.getElementById('app').style.display='';
    setTimeout(()=>document.getElementById('auth-wall').remove(),500);
    boot();
  },
  logout(){
    localStorage.removeItem(this.K);
    location.reload();
  }
};

/* ══════════════ BOOT ══════════════ */
function boot(){
  Theme.init();CL.init();
  const s=Settings.ld();if(s.date)S.dateOverride=s.date;
  const ti=todayIdx();S.dayIdx=ti>=0?ti:0;S.mapDay=S.dayIdx;
  const td=today(),sub=document.getElementById('hdr-sub');
  if(ti>=0)sub.textContent=`Day ${ti+1}/18 · ${fmtD(td)}`;
  else if(td<T.start)sub.textContent=diffD(td,T.start)+' days to go';
  else sub.textContent='Apr 2–19';
  buildSidebar();TodayView.render();TodayView.startCD();
  DaysView.render();setTimeout(()=>DaysView.swipe(),100);
  MapView.renderPills();BkView.render();MoreView.render();
  Weather.fetch().then(()=>{TodayView.render();TodayView.startCD();if(S.tab==='days')DaysView.show(S.dayIdx)});
}
document.querySelectorAll('.overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('on')}));
document.addEventListener('DOMContentLoaded',()=>Auth.init());
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');
// Load QR code library
const _qrScript=document.createElement('script');
_qrScript.src='https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
_qrScript.onload=()=>{if(S.tab==='bookings')BkView.qr()};
document.head.appendChild(_qrScript);
</script>
